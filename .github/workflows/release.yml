name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.0). Created if it does not exist."
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: Build Windows executable
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[render,era5]"
          python -m pip install --no-deps "SHARPpy==1.4.0a5"
          python -m pip install pyinstaller

      - name: Generate application icon
        run: python packaging/make_icon.py
        continue-on-error: true

      - name: Build one-folder executable
        run: pyinstaller packaging/sharpmod_gui.spec --noconfirm

      - name: Verify frozen model-fetch runtime
        shell: pwsh
        run: |
          $report = Join-Path $env:RUNNER_TEMP "model-fetch-runtime.json"
          $process = Start-Process `
            -FilePath "dist/SHARPpy-Reimagined/SHARPpy-Reimagined.exe" `
            -ArgumentList "--model-fetch-runtime-check", $report `
            -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            if (Test-Path $report) { Get-Content $report }
            throw "Frozen model-fetch runtime check failed"
          }
          $result = Get-Content $report -Raw | ConvertFrom-Json
          if (-not $result.ok -or $result.configured_models -lt 1) {
            throw "Frozen model-fetch runtime report is invalid"
          }
          $result | ConvertTo-Json

      - name: Build single-file executable
        env:
          SHARPMOD_ONEFILE: "1"
        run: pyinstaller packaging/sharpmod_gui.spec --noconfirm

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package one-folder build as zip
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          Compress-Archive -Path "dist/SHARPpy-Reimagined/*" `
            -DestinationPath "dist/SHARPpy-Reimagined-$tag-windows-x64.zip" -Force
          Copy-Item "dist/SHARPpy-Reimagined.exe" `
            "dist/SHARPpy-Reimagined-$tag-windows-x64.exe" -Force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: |
            dist/SHARPpy-Reimagined-*-windows-x64.zip
            dist/SHARPpy-Reimagined-*-windows-x64.exe

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: SHARPpy Reimagined ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/SHARPpy-Reimagined-*-windows-x64.zip
            dist/SHARPpy-Reimagined-*-windows-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
